<svg xmlns="http://www.w3.org/2000/svg" width="720" height="760" viewBox="0 0 720 760" role="img" aria-labelledby="title desc"><title id="title">Stack Precision poster</title><desc id="desc">Cinematic abstract artwork for Stack Precision with glowing stacked blocks.</desc><defs><radialGradient id="bg" cx="50%" cy="22%" r="70%"><stop stop-color="#14255f"/><stop offset=".48" stop-color="#070b20"/><stop offset="1" stop-color="#050816"/></radialGradient><linearGradient id="block" x1="170" y1="160" x2="550" y2="600"><stop stop-color="#00D4FF"/><stop offset=".52" stop-color="#6C63FF"/><stop offset="1" stop-color="#FFB703"/></linearGradient><filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="16" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="720" height="760" fill="url(#bg)"/><circle cx="570" cy="130" r="120" fill="#00D4FF" opacity=".13"/><circle cx="130" cy="620" r="150" fill="#6C63FF" opacity=".16"/><g filter="url(#glow)" opacity=".95"><path d="M190 520h340l52 56-62 56H180l-52-56 62-56Z" fill="url(#block)"/><path d="M250 430h260l42 46-50 46H242l-42-46 50-46Z" fill="#6C63FF"/><path d="M298 342h180l34 38-40 38H292l-34-38 40-38Z" fill="#00D4FF"/><path d="M334 266h112l26 30-31 30H329l-26-30 31-30Z" fill="#FFB703"/></g><path d="M120 676h480" stroke="#F7F8FF" stroke-opacity=".18"/><text x="54" y="94" fill="#F7F8FF" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="900">Stack</text><text x="54" y="148" fill="#00D4FF" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900">Precision</text><text x="56" y="198" fill="#AEB6D9" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Timing. Focus. Perfect landing.</text></svg>
